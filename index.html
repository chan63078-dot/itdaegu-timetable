<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT대구 강의시간표 검색</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      background: #f0f2f5;
      color: #111;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: #fff;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 60px;
    }
    .header-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header-logo span { color: #93c5fd; }
    .header-sub {
      font-size: 13px;
      color: #bfdbfe;
      margin-top: 1px;
    }
    .header-divider { flex: 1; }
    .header-badge {
      font-size: 11px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      padding: 4px 10px;
      border-radius: 20px;
      color: #e0f2fe;
    }

    /* ── 히어로 배너 ── */
    .hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 60%, #2563eb 100%);
      color: #fff;
      padding: 36px 24px 48px;
    }
    .hero-inner {
      max-width: 960px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .hero p {
      font-size: 14px;
      color: #bfdbfe;
      line-height: 1.6;
    }
    .hero-stats {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-item {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 10px 18px;
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: #bfdbfe;
      margin-top: 3px;
    }

    /* ── 메인 컨텐츠 ── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ── 검색 카드 래퍼 ── */
    .search-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      padding: 20px;
      margin-bottom: 20px;
    }
    .search-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── 안내 텍스트 ── */
    .notice {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #1e40af;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.6;
    }

    /* ── 결과 그리드 ── */
    #ts-results .ts-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    /* ── 푸터 ── */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      margin-top: 20px;
    }

    /* ── 반응형 ── */
    @media (max-width: 600px) {
      .hero h1 { font-size: 20px; }
      .hero-stats { gap: 10px; }
      .stat-item { padding: 8px 14px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="header-inner">
    <div>
      <div class="header-logo">IT<span>대구</span></div>
    </div>
    <div class="header-sub">강의시간표 검색</div>
    <div class="header-divider"></div>
    <div class="header-badge">2026년 4월 ~ 7월</div>
  </div>
</header>

<!-- 히어로 배너 -->
<section class="hero">
  <div class="hero-inner">
    <h1>강의시간표 검색</h1>
    <p>강의명, 강사명으로 빠르게 검색하거나<br>평일/주말·월별 필터로 원하는 강좌를 찾아보세요.</p>
    <div class="hero-stats">
      <div class="stat-item">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">전체 강좌</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-weekday">—</div>
        <div class="stat-label">평일반</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-weekend">—</div>
        <div class="stat-label">주말반</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-instructors">—</div>
        <div class="stat-label">강사진</div>
      </div>
    </div>
  </div>
</section>

<!-- 메인 -->
<main class="main">
  <div class="notice">
    💡 <span>강의시간표는 사정에 따라 변경될 수 있습니다. 휴강·보강 일정은 개별 강좌 카드의 비고란을 확인해 주세요.</span>
  </div>

  <div class="search-card">
    <div class="search-card-title">🔎 강좌 검색 및 필터</div>
    <!-- timetable-search.js 가 이 div 안을 채웁니다 -->
    <div id="timetable-section"></div>
  </div>
</main>

<footer class="footer">
  © 2026 IT대구 · 데이터 기준일: 2026-04-25
</footer>

<!-- ═══════════════════════════════════════════
     timetable-search.js (인라인 삽입 + 인라인 데이터 지원 패치)
════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  let allCourses = [];
  let filtered   = [];
  let query      = '';
  let filterType = '전체';
  let filterMonth= '전체';

  function getMonth(dateStr) {
    if (!dateStr) return '';
    return String(parseInt(dateStr.split('-')[1], 10));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${parseInt(m,10)}월 ${parseInt(d,10)}일`;
  }

  function timeBadge(time) {
    if (time === '09:00') return '<span class="ts-badge ts-badge-morning">오전 9시</span>';
    if (time === '10:00') return '<span class="ts-badge ts-badge-morning">오전 10시</span>';
    if (time === '14:00') return '<span class="ts-badge ts-badge-afternoon">오후 2시</span>';
    if (time === '15:00') return '<span class="ts-badge ts-badge-afternoon">오후 3시</span>';
    if (time === '19:00') return '<span class="ts-badge ts-badge-evening">저녁 7시</span>';
    return `<span class="ts-badge">${time}</span>`;
  }

  function typeBadge(type) {
    return type === '주말'
      ? '<span class="ts-badge ts-badge-weekend">주말</span>'
      : '<span class="ts-badge ts-badge-weekday">평일</span>';
  }

  /* 인라인 데이터 우선, 없으면 fetch */
  async function loadData() {
    try {
      if (window.__SCHEDULE_DATA__) {
        allCourses = window.__SCHEDULE_DATA__.courses || [];
      } else {
        const res = await fetch('./data/schedule.json');
        if (!res.ok) throw new Error('fetch fail');
        const json = await res.json();
        allCourses = json.courses || [];
      }
      updateStats();
      applyFilter();
    } catch (e) {
      console.error('[TimetableSearch] 데이터 로드 실패:', e);
      document.getElementById('ts-results').innerHTML =
        '<p class="ts-empty">❌ 시간표 데이터를 불러오지 못했습니다.</p>';
    }
  }

  function updateStats() {
    const weekday = allCourses.filter(c => c.type === '평일').length;
    const weekend = allCourses.filter(c => c.type === '주말').length;
    const instructors = new Set(allCourses.map(c => c.instructor).filter(Boolean)).size;

    const el = id => document.getElementById(id);
    if (el('stat-total'))       el('stat-total').textContent = allCourses.length;
    if (el('stat-weekday'))     el('stat-weekday').textContent = weekday;
    if (el('stat-weekend'))     el('stat-weekend').textContent = weekend;
    if (el('stat-instructors')) el('stat-instructors').textContent = instructors + '명';
  }

  function applyFilter() {
    const q = query.trim().toLowerCase();
    filtered = allCourses.filter(c => {
      const month = getMonth(c.startDate);
      if (filterType !== '전체' && c.type !== filterType) return false;
      if (filterMonth !== '전체' && month !== filterMonth) return false;
      if (!q) return true;
      return (
        c.name.toLowerCase().includes(q) ||
        (c.instructor && c.instructor.toLowerCase().includes(q)) ||
        (c.room && c.room.toLowerCase().includes(q))
      );
    });
    filtered.sort((a, b) => (a.startDate > b.startDate ? 1 : -1));
    renderResults();
  }

  function renderResults() {
    const container = document.getElementById('ts-results');
    if (!container) return;

    if (allCourses.length === 0) {
      container.innerHTML = '<p class="ts-empty">⏳ 데이터 로딩 중...</p>';
      return;
    }
    if (filtered.length === 0) {
      container.innerHTML = '<p class="ts-empty">검색 결과가 없습니다.</p>';
      return;
    }

    const cards = filtered.map(c => {
      const month = getMonth(c.startDate);
      return `
        <div class="ts-card">
          <div class="ts-card-title">${c.name}</div>
          <div class="ts-card-badges">
            ${typeBadge(c.type)}
            ${timeBadge(c.time)}
            <span class="ts-badge ts-badge-month">${month}월</span>
          </div>
          <div class="ts-card-meta">
            <span>📅 ${formatDate(c.startDate)} ~ ${formatDate(c.endDate)}</span>
            <span>🏫 ${c.room}</span>
            ${c.instructor ? `<span>👤 ${c.instructor}</span>` : ''}
            <span>📆 ${c.days}</span>
          </div>
          ${c.notes ? `<div class="ts-card-notes">⚠️ ${c.notes}</div>` : ''}
        </div>`;
    }).join('');

    container.innerHTML = `
      <div class="ts-count">${filtered.length}개 강좌</div>
      <div class="ts-card-grid">${cards}</div>`;
  }

  function injectStyles() {
    if (document.getElementById('ts-styles')) return;
    const style = document.createElement('style');
    style.id = 'ts-styles';
    style.textContent = `
      .ts-wrap { padding: 4px 0; }
      .ts-search-bar {
        display: flex; align-items: center; gap: 8px;
        background: #f9fafb; border: 1.5px solid #d1d5db;
        border-radius: 10px; padding: 10px 14px;
        margin-bottom: 12px; transition: border-color .15s;
      }
      .ts-search-bar:focus-within { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
      .ts-search-icon { font-size: 16px; color: #9ca3af; flex-shrink: 0; }
      .ts-search-bar input {
        border: none; outline: none; background: transparent;
        font-size: 14px; flex: 1; color: #111; font-family: inherit;
      }
      .ts-search-bar input::placeholder { color: #9ca3af; }
      .ts-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
      .ts-filter-label { font-size: 11px; color: #9ca3af; font-weight: 600; letter-spacing: .3px; }
      .ts-filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
      .ts-chip {
        font-size: 12px; padding: 5px 12px; border-radius: 20px;
        border: 1px solid #d1d5db; background: #fff;
        color: #6b7280; cursor: pointer; transition: all .15s; font-family: inherit;
      }
      .ts-chip:hover { border-color: #818cf8; color: #4f46e5; background: #f5f3ff; }
      .ts-chip.active { background: #eef2ff; color: #4338ca; border-color: #a5b4fc; font-weight: 600; }
      .ts-divider { width: 1px; height: 20px; background: #e5e7eb; }
      .ts-count { font-size: 12px; color: #9ca3af; margin-bottom: 10px; font-weight: 500; }
      .ts-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
      .ts-card {
        background: #fff; border: 1px solid #e5e7eb;
        border-radius: 10px; padding: 12px 14px;
        transition: box-shadow .15s, border-color .15s;
      }
      .ts-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #c7d2fe; }
      .ts-card-title { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 6px; line-height: 1.4; }
      .ts-card-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
      .ts-badge {
        font-size: 11px; padding: 2px 8px; border-radius: 4px;
        font-weight: 600; display: inline-block;
      }
      .ts-badge-morning   { background: #fef9c3; color: #854d0e; }
      .ts-badge-afternoon { background: #ffedd5; color: #9a3412; }
      .ts-badge-evening   { background: #ede9fe; color: #5b21b6; }
      .ts-badge-weekday   { background: #dbeafe; color: #1e40af; }
      .ts-badge-weekend   { background: #dcfce7; color: #166534; }
      .ts-badge-month     { background: #f3f4f6; color: #374151; }
      .ts-card-meta { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #4b5563; }
      .ts-card-notes { font-size: 11px; color: #d97706; margin-top: 6px; padding-top: 6px; border-top: 1px solid #fef3c7; }
      .ts-empty { font-size: 13px; color: #9ca3af; text-align: center; padding: 32px 0; }
    `;
    document.head.appendChild(style);
  }

  function buildHTML() {
    return `
      <div class="ts-wrap">
        <div class="ts-search-bar">
          <span class="ts-search-icon">🔍</span>
          <input id="ts-input" type="text"
            placeholder="강의명·강사명·강의실 검색 (예: 파이썬, 석득화, B[10층])"
            autocomplete="off" />
        </div>
        <div class="ts-filters">
          <span class="ts-filter-label">유형</span>
          <div class="ts-filter-group" id="ts-type-filters">
            ${['전체','평일','주말'].map(t =>
              `<button class="ts-chip${t==='전체'?' active':''}" data-type="${t}">${t}</button>`
            ).join('')}
          </div>
          <div class="ts-divider"></div>
          <span class="ts-filter-label">월</span>
          <div class="ts-filter-group" id="ts-month-filters">
            ${['전체','4','5','6','7'].map(m =>
              `<button class="ts-chip${m==='전체'?' active':''}" data-month="${m}">${m==='전체'?'전체':m+'월'}</button>`
            ).join('')}
          </div>
        </div>
        <div id="ts-results"></div>
      </div>`;
  }

  function bindEvents() {
    const input = document.getElementById('ts-input');
    if (input) {
      input.addEventListener('input', e => {
        query = e.target.value;
        applyFilter();
      });
    }
    document.getElementById('ts-type-filters').addEventListener('click', e => {
      const btn = e.target.closest('.ts-chip');
      if (!btn) return;
      document.querySelectorAll('#ts-type-filters .ts-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterType = btn.dataset.type;
      applyFilter();
    });
    document.getElementById('ts-month-filters').addEventListener('click', e => {
      const btn = e.target.closest('.ts-chip');
      if (!btn) return;
      document.querySelectorAll('#ts-month-filters .ts-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterMonth = btn.dataset.month;
      applyFilter();
    });
  }

  window.initTimetableSearch = function (targetSelector) {
    injectStyles();
    const target = document.querySelector(targetSelector);
    if (!target) { console.warn('[TimetableSearch] 요소 없음:', targetSelector); return; }
    target.innerHTML = buildHTML();
    bindEvents();
    document.getElementById('ts-results').innerHTML =
      '<p class="ts-empty">검색어를 입력하거나 필터를 선택하세요.</p>';
    loadData();
  };

  /* 페이지 로드 후 자동 실행 */
  document.addEventListener('DOMContentLoaded', () => {
    window.initTimetableSearch('#timetable-section');
  });

})();
</script>

</body>
</html>
