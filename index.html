<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Academy 대구 강의시간표</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      background: #f0f2f5;
      color: #111;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: #fff;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 60px;
    }
    .header-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .header-logo span { color: #93c5fd; }
    .header-sub { font-size: 13px; color: #bfdbfe; }
    .header-divider { flex: 1; }
    .header-badge {
      font-size: 12px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      padding: 4px 14px;
      border-radius: 20px;
      color: #e0f2fe;
      font-weight: 600;
    }

    .main { max-width: 1400px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── Filter Card ── */
    .filter-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .filter-top {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f9fafb;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 14px;
      flex: 1;
      transition: border-color .15s;
    }
    .search-bar:focus-within { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .search-bar input {
      border: none; outline: none; background: transparent;
      font-size: 14px; flex: 1; color: #111; font-family: inherit;
    }
    .search-bar input::placeholder { color: #9ca3af; }

    /* View toggle */
    .view-toggle {
      display: flex;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .view-btn {
      font-size: 13px; padding: 9px 16px;
      background: #fff; color: #6b7280;
      border: none; cursor: pointer;
      font-family: inherit; font-weight: 500;
      transition: all .15s;
    }
    .view-btn:not(:last-child) { border-right: 1px solid #e5e7eb; }
    .view-btn:hover { background: #f5f3ff; color: #4f46e5; }
    .view-btn.active { background: #eef2ff; color: #4338ca; font-weight: 700; }

    /* Chip filters */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 11px; color: #9ca3af; font-weight: 600; letter-spacing: .3px; white-space: nowrap; }
    .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 12px; padding: 5px 12px; border-radius: 20px;
      border: 1px solid #d1d5db; background: #fff;
      color: #6b7280; cursor: pointer; transition: all .15s; font-family: inherit;
      white-space: nowrap;
    }
    .chip:hover { border-color: #818cf8; color: #4f46e5; background: #f5f3ff; }
    .chip.active { background: #eef2ff; color: #4338ca; border-color: #a5b4fc; font-weight: 600; }
    .filter-divider { width: 1px; background: #e5e7eb; align-self: stretch; margin: 0 6px; }

    /* ── TABLE VIEW ── */
    .table-wrap {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 2px solid #e5e7eb;
    }
    .view-title { font-size: 14px; font-weight: 700; color: #111; }
    .result-count { font-size: 13px; color: #6b7280; }
    .result-count strong { color: #1e3a8a; font-size: 15px; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #1e3a8a; }
    thead th {
      padding: 11px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: #fff;
      letter-spacing: 0.3px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-right: 1px solid rgba(255,255,255,.1);
    }
    thead th:last-child { border-right: none; }
    thead th:hover { background: #1d4ed8; }
    thead th.asc::after { content: ' ▲'; font-size: 9px; color: #93c5fd; }
    thead th.desc::after { content: ' ▼'; font-size: 9px; color: #93c5fd; }
    tbody tr:nth-child(even) { background: #f9fafb; }
    tbody tr:hover { background: #eff6ff !important; }
    tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: middle;
      font-size: 13px;
    }
    tbody tr:last-child td { border-bottom: none; }
    .td-name { font-weight: 600; color: #111; min-width: 200px; line-height: 1.4; }
    .td-room { color: #374151; white-space: nowrap; }
    .td-instructor { color: #374151; white-space: nowrap; }
    .td-days { font-weight: 500; white-space: nowrap; color: #374151; }
    .td-date { color: #6b7280; white-space: nowrap; font-size: 12px; }
    .td-notes { color: #d97706; font-size: 12px; min-width: 180px; line-height: 1.5; }

    /* ── GRID VIEW ── */
    .grid-wrap {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .grid-scroll { overflow-x: auto; }

    .grid-table { border-collapse: collapse; min-width: 700px; }
    .grid-table thead th {
      background: #1e3a8a;
      color: #fff;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.12);
    }
    .grid-table thead th.th-time {
      background: #374151;
      min-width: 120px;
      width: 120px;
    }
    .grid-table thead th.th-room { min-width: 160px; }

    .grid-table tbody td {
      border: 1px solid #e5e7eb;
      vertical-align: top;
      padding: 0;
    }
    .grid-table .td-time {
      background: #f8fafc;
      text-align: center;
      padding: 10px 8px;
      vertical-align: middle;
      border-right: 2px solid #d1d5db;
    }
    .td-time .tl-range { font-size: 12px; font-weight: 800; color: #1e3a8a; line-height: 1.4; white-space: nowrap; }
    .td-time .tl-sub   { font-size: 10px; color: #9ca3af; margin-top: 3px; }
    .td-time .tl-badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
    }
    .tl-badge.gov    { background: #dbeafe; color: #1e40af; }
    .tl-badge.wkd-am { background: #fef9c3; color: #92400e; }
    .tl-badge.wkd-pm { background: #ffedd5; color: #9a3412; }
    .tl-badge.night  { background: #ede9fe; color: #5b21b6; }

    .grid-cell {
      padding: 6px;
      vertical-align: top;
      min-height: 70px;
    }
    .grid-cell-empty { background: #fafafa; }

    /* Course block */
    .cb {
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 5px;
      border-left: 4px solid;
      line-height: 1.45;
    }
    .cb:last-child { margin-bottom: 0; }

    /* 평일 국비 (09:00) */
    .cb-gov { background: #eff6ff; border-left-color: #2563eb; }
    /* 평일 야간 (19:00) */
    .cb-night { background: #f5f3ff; border-left-color: #7c3aed; }
    /* 주말 오전 (10:00) */
    .cb-wkd-am { background: #fffbeb; border-left-color: #f59e0b; }
    /* 주말 오후 (14:00 / 15:00) */
    .cb-wkd-pm { background: #fff7ed; border-left-color: #f97316; }
    /* 주말 09:00 (AICE 등) */
    .cb-wkd-09 { background: #f0fdf4; border-left-color: #16a34a; }

    .cb-name { font-size: 12px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .cb-meta { font-size: 11px; color: #6b7280; }
    .cb-meta span { margin-right: 6px; }
    .cb-date { font-size: 10px; color: #9ca3af; margin-top: 3px; }
    .cb-notes { font-size: 10px; color: #d97706; margin-top: 3px; line-height: 1.4; }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
    }
    .badge-weekday { background: #dbeafe; color: #1e40af; }
    .badge-weekend { background: #d1fae5; color: #065f46; }
    .badge-morning  { background: #fef9c3; color: #854d0e; }
    .badge-afternoon{ background: #ffedd5; color: #9a3412; }
    .badge-evening  { background: #ede9fe; color: #5b21b6; }

    .empty-msg { text-align: center; padding: 48px; color: #9ca3af; font-size: 14px; }

    /* ── TODAY BANNER ── */
    .today-banner {
      background: linear-gradient(135deg, #065f46, #059669);
      color: #fff;
      border-radius: 12px;
      padding: 12px 18px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      box-shadow: 0 2px 10px rgba(5,150,105,.25);
    }
    .today-banner strong { font-size: 15px; }
    .today-banner-close {
      margin-left: auto; background: none; border: none;
      color: rgba(255,255,255,.7); cursor: pointer; font-size: 16px; line-height: 1;
      padding: 0 4px;
    }
    .today-banner-close:hover { color: #fff; }
    .chip-today { border-color: #059669 !important; color: #065f46 !important; }
    .chip-today.active { background: #d1fae5 !important; border-color: #059669 !important; color: #065f46 !important; }
    tr.row-today td { background: #f0fdf4 !important; }
    tr.row-today td:first-child { border-left: 3px solid #059669; }

    /* ── GANTT VIEW ── */
    .gantt-wrap {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .gantt-scroll { overflow-x: auto; }
    .gantt-inner { min-width: 700px; }

    .g-header-row, .g-row {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
    }
    .g-row:hover .g-label { background: #f1f5f9; }
    .g-label {
      width: 155px;
      min-width: 155px;
      flex-shrink: 0;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      background: #f8fafc;
      border-right: 2px solid #d1d5db;
      display: flex;
      align-items: center;
      word-break: keep-all;
      line-height: 1.4;
    }
    .g-label-head { background: #1e3a8a; color: #fff; font-size: 12px; min-height: 36px; }

    .g-timeline {
      flex: 1;
      position: relative;
      display: flex;
    }
    .g-timeline-head { min-height: 36px; align-items: stretch; }

    .g-month {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: #1e3a8a;
      border-right: 1px solid rgba(255,255,255,.2);
    }
    .g-month-bg {
      flex-shrink: 0;
      border-right: 1px solid #e5e7eb;
      position: relative;
      height: 100%;
    }
    .g-month-bg-alt { background: rgba(0,0,0,.018); }

    .g-today-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: #ef4444;
      z-index: 5;
      pointer-events: none;
    }
    .g-today-line::after {
      content: '오늘';
      position: absolute;
      top: 3px;
      left: 4px;
      font-size: 9px;
      color: #ef4444;
      font-weight: 800;
      white-space: nowrap;
    }

    .g-bar {
      position: absolute;
      border-radius: 5px;
      display: flex;
      align-items: center;
      overflow: hidden;
      cursor: pointer;
      z-index: 3;
      transition: filter .15s, transform .1s;
      border: 1px solid transparent;
      min-width: 3px;
    }
    .g-bar:hover { filter: brightness(.92); transform: scaleY(1.06); z-index: 10; }
    .g-bar.g-bar-today { box-shadow: 0 0 0 2px #059669; }
    .g-bar-text {
      padding: 0 6px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Gantt bar colors (more saturated than grid card backgrounds) */
    .g-bar.cb-gov    { background: #93c5fd; border-color: #2563eb; }
    .g-bar.cb-gov    .g-bar-text { color: #1e3a8a; }
    .g-bar.cb-night  { background: #c4b5fd; border-color: #7c3aed; }
    .g-bar.cb-night  .g-bar-text { color: #4c1d95; }
    .g-bar.cb-wkd-am { background: #fcd34d; border-color: #d97706; }
    .g-bar.cb-wkd-am .g-bar-text { color: #78350f; }
    .g-bar.cb-wkd-pm { background: #fb923c; border-color: #ea580c; }
    .g-bar.cb-wkd-pm .g-bar-text { color: #fff; }
    .g-bar.cb-wkd-09 { background: #6ee7b7; border-color: #059669; }
    .g-bar.cb-wkd-09 .g-bar-text { color: #064e3b; }

    /* Gantt legend */
    .gantt-legend {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding: 10px 16px;
      border-top: 1px solid #f3f4f6;
      font-size: 11px; color: #6b7280;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    .footer {
      text-align: center; padding: 24px; font-size: 12px;
      color: #9ca3af; border-top: 1px solid #e5e7eb;
      background: #fff; margin-top: 20px;
    }

    @media (max-width: 768px) {
      .filter-top { flex-direction: column; align-items: stretch; }
      .view-toggle { align-self: flex-start; }
      thead th, tbody td { padding: 8px 10px; }
      .td-name { min-width: 160px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-logo">IT<span>Academy</span></div>
    <div class="header-sub">대구 강의시간표</div>
    <div class="header-divider"></div>
    <div class="header-badge">📍 대구</div>
  </div>
</header>

<main class="main">
  <div class="filter-card">
    <div class="filter-top">
      <div class="search-bar">
        <span>🔍</span>
        <input id="search-input" type="text"
          placeholder="강의명 · 강사명 · 강의실 검색"
          autocomplete="off" />
      </div>
      <div class="view-toggle">
        <button class="view-btn active" data-view="table">📋 테이블</button>
        <button class="view-btn" data-view="grid">📅 그리드</button>
        <button class="view-btn" data-view="gantt">📊 간트</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">유형</span>
      <div class="filter-group" id="type-filters">
        <button class="chip active" data-type="전체">전체</button>
        <button class="chip" data-type="평일">평일</button>
        <button class="chip" data-type="주말">주말</button>
      </div>
      <div class="filter-divider"></div>
      <span class="filter-label">월</span>
      <div class="filter-group" id="month-filters">
        <button class="chip active" data-month="전체">전체</button>
      </div>
      <div class="filter-divider"></div>
      <button class="chip chip-today" id="btn-today">📍 오늘</button>
    </div>
  </div>

  <!-- TODAY BANNER -->
  <div id="today-banner" class="today-banner" style="display:none">
    <span>📍</span>
    <span id="today-label"></span>
    <button class="today-banner-close" id="btn-today-close">✕</button>
  </div>

  <!-- TABLE VIEW -->
  <div id="view-table" class="table-wrap">
    <div class="view-header">
      <div class="view-title">🗓️ 강의 목록</div>
      <div class="result-count" id="count-table"></div>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-col="name">강의명</th>
            <th data-col="room">강의실</th>
            <th data-col="instructor">강사명</th>
            <th data-col="type">유형</th>
            <th data-col="days">요일</th>
            <th data-col="time">시간</th>
            <th data-col="startDate">시작일</th>
            <th data-col="endDate">종료일</th>
            <th data-col="notes">비고</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="9" class="empty-msg">⏳ 로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- GRID VIEW -->
  <div id="view-grid" class="grid-wrap" style="display:none">
    <div class="view-header">
      <div class="view-title">📅 강의실별 시간표</div>
      <div class="result-count" id="count-grid"></div>
    </div>
    <div class="grid-scroll">
      <div id="grid-container"></div>
    </div>
  </div>
  <!-- GANTT VIEW -->
  <div id="view-gantt" class="gantt-wrap" style="display:none">
    <div class="view-header">
      <div class="view-title">📊 강좌 일정 타임라인</div>
      <div class="result-count" id="count-gantt"></div>
    </div>
    <div class="gantt-scroll">
      <div id="gantt-container"></div>
    </div>
    <div class="gantt-legend">
      <span style="font-weight:600;color:#374151">범례:</span>
      <div class="legend-item"><div class="legend-dot" style="background:#93c5fd;border:1px solid #2563eb"></div>국비 오전반</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c4b5fd;border:1px solid #7c3aed"></div>평일 야간반</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fcd34d;border:1px solid #d97706"></div>주말 오전반</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fb923c;border:1px solid #ea580c"></div>주말 오후반</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6ee7b7;border:1px solid #059669"></div>주말 09시반</div>
      <div class="legend-item" style="margin-left:8px"><div class="legend-dot" style="background:#ef4444;width:3px;border-radius:0"></div>오늘</div>
    </div>
  </div>
</main>

<footer class="footer">
  © 2026 IT Academy 대구 · 데이터 기준일: 2026-04-25

,20,21,27,28 / 휴강: 06/06~07"},{"id":64,"branch":"대구","name":"자바2/주말","room":"B[10층]-1","instructor":"김성우2","days":"토/일","time":"14:00","type":"주말","startDate":"2026-05-30","endDate":"2026-06-21","notes":"날짜: 05/02,03,09,10,16,17,30,31"},{"id":65,"branch":"대구","name":"네트워크1/주말","room":"C[10층]-1","instructor":"김성우2","days":"토/일","time":"14:00","type":"주말","startDate":"2026-05-30","endDate":"2026-06-21","notes":""},{"id":66,"branch":"대구","name":"나만의 GPT 올인원 로드맵","room":"AI아카데미-1","instructor":"AI강남:정운국","days":"토/일","time":"14:00","type":"주말","startDate":"2026-05-02","endDate":"2026-05-31","notes":"휴강: 05/23~24"},{"id":67,"branch":"대구","name":"ADsP/주말","room":"A[10층]-1","instructor":"김정우5","days":"토/일","time":"10:00","type":"주말","startDate":"2026-07-04","endDate":"2026-07-26","notes":""},{"id":68,"branch":"대구","name":"웹기초1/주말","room":"B[10층]-1","instructor":"","days":"토/일","time":"10:00","type":"주말","startDate":"2026-06-27","endDate":"2026-07-19","notes":""},{"id":69,"branch":"대구","name":"SQLD/주말","room":"C[10층]-1","instructor":"박호범2","days":"토/일","time":"10:00","type":"주말","startDate":"2026-07-11","endDate":"2026-08-02","notes":""},{"id":70,"branch":"대구","name":"자바1/주말","room":"B[10층]-1","instructor":"","days":"토/일","time":"14:00","type":"주말","startDate":"2026-06-27","endDate":"2026-07-19","notes":""},{"id":71,"branch":"대구","name":"네트워크2/주말","room":"C[10층]-1","instructor":"","days":"토/일","time":"14:00","type":"주말","startDate":"2026-06-27","endDate":"2026-07-19","notes":""},{"id":72,"branch":"대구","name":"빅데이터분석기사필기/주말","room":"A[10층]-1","instructor":"박호범2","days":"토/일","time":"15:00","type":"주말","startDate":"2026-07-25","endDate":"2026-08-23","notes":""},{"id":73,"branch":"대구","name":"웹기초2/주말","room":"B[10층]-1","instructor":"","days":"토/일","time":"10:00","type":"주말","startDate":"2026-07-25","endDate":"2026-08-16","notes":""},{"id":74,"branch":"대구","name":"정보처리기사실기1/주말","room":"E[9층]-1","instructor":"","days":"토/일","time":"10:00","type":"주말","startDate":"2026-08-08","endDate":"2026-09-06","notes":""},{"id":75,"branch":"대구","name":"자바2/주말","room":"B[10층]-1","instructor":"","days":"토/일","time":"14:00","type":"주말","startDate":"2026-07-25","endDate":"2026-08-16","notes":""}]};

<script>
(function () {
  'use strict';

  let allCourses = [];
  let filtered   = [];
  let query      = '';
  let filterType  = '전체';
  let filterMonth = '전체';
  let sortCol = 'startDate';
  let sortDir = 'asc';
  let viewMode = 'table';
  let todayMode = false;

  // ── 오늘 수업 판별 ──
  const DOW_MAP = {'월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':0};
  const KR_DAYS = ['일','월','화','수','목','금','토'];

  function parseDow(days) {
    if (!days) return new Set();
    if (days === '월~금') return new Set([1,2,3,4,5]);
    if (days === '토/일') return new Set([0,6]);
    const s = new Set();
    for (const ch of days) if (DOW_MAP[ch] !== undefined) s.add(DOW_MAP[ch]);
    return s;
  }

  function isActiveToday(c) {
    const today = new Date();
    const ys = today.toISOString().slice(0,10);
    if (ys < c.startDate || ys > c.endDate) return false;
    return parseDow(c.days).has(today.getDay());
  }

  function todayLabel() {
    const t = new Date();
    const m = t.getMonth()+1, d = t.getDate(), dow = KR_DAYS[t.getDay()];
    return `<strong>${m}월 ${d}일 (${dow})</strong> 진행 중인 강좌`;
  }

  // ── Gantt 계산 ──
  const G_START = new Date('2026-03-01');
  const G_END   = new Date('2026-09-30');
  const G_DAYS  = (G_END - G_START) / 86400000;
  const G_MONTHS = [
    {label:'3월',days:31},{label:'4월',days:30},{label:'5월',days:31},
    {label:'6월',days:30},{label:'7월',days:31},{label:'8월',days:31},{label:'9월',days:30}
  ];

  function datePct(str) {
    const d = new Date(str);
    return Math.max(0, Math.min(100, (d - G_START) / 86400000 / G_DAYS * 100));
  }

  function assignLanes(courses) {
    const sorted = [...courses].sort((a,b) => a.startDate < b.startDate ? -1 : 1);
    const laneEnds = [];
    return sorted.map(c => {
      let lane = laneEnds.findIndex(e => c.startDate > e);
      if (lane === -1) { lane = laneEnds.length; }
      laneEnds[lane] = c.endDate;
      return { c, lane };
    });
  }

  const ROOM_ORDER = [
    'A[10층]-1','A[10층]-2',
    'B[10층]-1','B[10층]-2',
    'C[10층]-1','C[10층]-2',
    'D[9층]-1',
    'E[9층]-1','E[9층]-2',
    'AI아카데미-1',
    '이스트캠프 모집대행-1','이스트캠프 모집대행-2'
  ];
  const TIME_ORDER = ['09:00','10:00','14:00','15:00','19:00'];

  function getEndTime(c) {
    if (c.time === '09:00') return c.type === '평일' ? '18:00' : '13:00';
    if (c.time === '10:00') return '13:00';
    if (c.time === '14:00') return '17:00';
    if (c.time === '15:00') return '18:00';
    if (c.time === '19:00') return '22:00';
    return c.time;
  }

  function slotMeta(time, type) {
    if (time === '09:00' && type === '평일') return { range:'09:00 ~ 18:00', sub:'국비 오전반', badge:'gov' };
    if (time === '09:00' && type === '주말') return { range:'09:00 ~ 13:00', sub:'주말 오전반', badge:'wkd-am' };
    if (time === '10:00') return { range:'10:00 ~ 13:00', sub:'주말 오전반', badge:'wkd-am' };
    if (time === '14:00') return { range:'14:00 ~ 17:00', sub:'주말 오후반', badge:'wkd-pm' };
    if (time === '15:00') return { range:'15:00 ~ 18:00', sub:'주말 오후반', badge:'wkd-pm' };
    if (time === '19:00') return { range:'19:00 ~ 22:00', sub:'평일 야간반', badge:'night' };
    return { range: time, sub: '', badge: 'gov' };
  }

  function getMonth(d) { return d ? String(parseInt(d.split('-')[1], 10)) : ''; }

  function fmt(d) {
    if (!d) return '';
    const [,m,day] = d.split('-');
    return `${parseInt(m,10)}/${parseInt(day,10)}`;
  }

  function timeBadge(t) {
    const map = {
      '09:00':'<span class="badge badge-morning">오전 9시</span>',
      '10:00':'<span class="badge badge-morning">오전 10시</span>',
      '14:00':'<span class="badge badge-afternoon">오후 2시</span>',
      '15:00':'<span class="badge badge-afternoon">오후 3시</span>',
      '19:00':'<span class="badge badge-evening">저녁 7시</span>',
    };
    return map[t] || `<span class="badge">${t}</span>`;
  }

  function typeBadge(t) {
    return t === '주말'
      ? '<span class="badge badge-weekend">주말</span>'
      : '<span class="badge badge-weekday">평일</span>';
  }

  function cbClass(c) {
    if (c.type === '주말') {
      if (c.time === '09:00') return 'cb cb-wkd-09';
      if (c.time === '14:00' || c.time === '15:00') return 'cb cb-wkd-pm';
      return 'cb cb-wkd-am';
    }
    return c.time === '19:00' ? 'cb cb-night' : 'cb cb-gov';
  }

  /* ── Init ── */
  function initMonthFilters() {
    const months = [...new Set(allCourses.map(c => getMonth(c.startDate)).filter(Boolean))]
      .sort((a,b) => Number(a) - Number(b));
    const container = document.getElementById('month-filters');
    months.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.month = m;
      btn.textContent = m + '월';
      container.appendChild(btn);
    });
  }

  /* ── Filter ── */
  function applyFilter() {
    const q = query.trim().toLowerCase();
    filtered = allCourses.filter(c => {
      if (filterType  !== '전체' && c.type !== filterType)           return false;
      if (filterMonth !== '전체' && getMonth(c.startDate) !== filterMonth) return false;
      if (todayMode && !isActiveToday(c)) return false;
      if (!q) return true;
      return (
        c.name.toLowerCase().includes(q) ||
        (c.instructor && c.instructor.toLowerCase().includes(q)) ||
        (c.room && c.room.toLowerCase().includes(q))
      );
    });

    // Today banner
    const banner = document.getElementById('today-banner');
    if (todayMode) {
      document.getElementById('today-label').innerHTML = todayLabel();
      banner.style.display = 'flex';
    } else {
      banner.style.display = 'none';
    }

    if (viewMode === 'table') renderTable();
    else if (viewMode === 'grid') renderGrid();
    else renderGantt();
  }

  /* ── Table ── */
  function renderTable() {
    const sorted = [...filtered].sort((a,b) => {
      const va = String(a[sortCol]||''), vb = String(b[sortCol]||'');
      if (va < vb) return sortDir==='asc' ? -1 : 1;
      if (va > vb) return sortDir==='asc' ?  1 : -1;
      return 0;
    });

    document.getElementById('count-table').innerHTML =
      `<strong>${sorted.length}</strong>개 강좌`;

    document.getElementById('table-body').innerHTML = sorted.length === 0
      ? '<tr><td colspan="9" class="empty-msg">검색 결과가 없습니다.</td></tr>'
      : sorted.map(c => `
        <tr class="${isActiveToday(c)?'row-today':''}">
          <td class="td-name">${c.name}</td>
          <td class="td-room">${c.room||''}</td>
          <td class="td-instructor">${c.instructor||'-'}</td>
          <td>${typeBadge(c.type)}</td>
          <td class="td-days">${c.days}</td>
          <td>${timeBadge(c.time)}</td>
          <td class="td-date">${fmt(c.startDate)}</td>
          <td class="td-date">${fmt(c.endDate)}</td>
          <td class="td-notes">${c.notes||''}</td>
        </tr>`).join('');
  }

  /* ── Grid ── */
  function renderGrid() {
    document.getElementById('count-grid').innerHTML =
      `<strong>${filtered.length}</strong>개 강좌`;

    if (filtered.length === 0) {
      document.getElementById('grid-container').innerHTML =
        '<p class="empty-msg">검색 결과가 없습니다.</p>';
      return;
    }

    const rooms = [...new Set(filtered.map(c => c.room).filter(Boolean))].sort((a,b) => {
      const ia = ROOM_ORDER.indexOf(a), ib = ROOM_ORDER.indexOf(b);
      if (ia===-1 && ib===-1) return a.localeCompare(b,'ko');
      if (ia===-1) return 1; if (ib===-1) return -1;
      return ia - ib;
    });

    // (시작시간, 유형) 조합별로 행을 분리 — 예: 09:00 평일(국비)과 09:00 주말(AICE)을 별도 행으로
    const slotKeys = [...new Set(filtered.map(c => `${c.time}|${c.type}`))].sort((a, b) => {
      const [ta] = a.split('|'), [tb] = b.split('|');
      const ia = TIME_ORDER.indexOf(ta), ib = TIME_ORDER.indexOf(tb);
      if (ta !== tb) return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
      return a.includes('평일') ? -1 : 1;
    });

    let html = '<table class="grid-table"><thead><tr>';
    html += '<th class="th-time">수업 시간</th>';
    rooms.forEach(r => { html += `<th class="th-room">${r}</th>`; });
    html += '</tr></thead><tbody>';

    slotKeys.forEach(key => {
      const [time, type] = key.split('|');
      const sm = slotMeta(time, type);
      const badgeLabel = sm.badge==='gov'?'국비': sm.badge==='night'?'야간': sm.badge==='wkd-am'?'오전':'오후';
      html += '<tr>';
      html += `<td class="td-time">
        <div class="tl-range">${sm.range}</div>
        <div class="tl-sub">${sm.sub}</div>
        <span class="tl-badge ${sm.badge}">${badgeLabel}</span>
      </td>`;

      rooms.forEach(room => {
        const cs = filtered.filter(c => c.time === time && c.type === type && c.room === room);
        if (cs.length === 0) {
          html += '<td class="grid-cell grid-cell-empty"></td>';
        } else {
          html += '<td class="grid-cell">';
          cs.forEach(c => {
            html += `<div class="${cbClass(c)}">
              <div class="cb-name">${c.name}</div>
              <div class="cb-meta">
                ${c.instructor ? `<span>👤 ${c.instructor}</span>` : ''}
                <span>📆 ${c.days}</span>
              </div>
              <div class="cb-date">개: ${fmt(c.startDate)} · 종: ${fmt(c.endDate)}</div>
              ${c.notes ? `<div class="cb-notes">⚠️ ${c.notes}</div>` : ''}
            </div>`;
          });
          html += '</td>';
        }
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('grid-container').innerHTML = html;
  }

  /* ── Gantt ── */
  function renderGantt() {
    document.getElementById('count-gantt').innerHTML = `<strong>${filtered.length}</strong>개 강좌`;

    if (filtered.length === 0) {
      document.getElementById('gantt-container').innerHTML = '<p class="empty-msg">검색 결과가 없습니다.</p>';
      return;
    }

    const rooms = [...new Set(filtered.map(c => c.room).filter(Boolean))].sort((a,b) => {
      const ia = ROOM_ORDER.indexOf(a), ib = ROOM_ORDER.indexOf(b);
      if (ia===-1&&ib===-1) return a.localeCompare(b,'ko');
      if (ia===-1) return 1; if (ib===-1) return -1; return ia-ib;
    });

    const BAR_H = 26, BAR_GAP = 4, PAD = 6;
    const todayPct = datePct(new Date().toISOString().slice(0,10));

    let html = '<div class="gantt-inner">';

    // Header
    html += '<div class="g-header-row">';
    html += '<div class="g-label g-label-head">강의실</div>';
    html += '<div class="g-timeline g-timeline-head">';
    G_MONTHS.forEach(({label,days}) => {
      html += `<div class="g-month" style="width:${days/G_DAYS*100}%">${label}</div>`;
    });
    html += '</div></div>';

    rooms.forEach(room => {
      const lanes = assignLanes(filtered.filter(c => c.room === room));
      const nLane = lanes.length ? Math.max(...lanes.map(l=>l.lane))+1 : 1;
      const rowH  = PAD*2 + nLane*(BAR_H+BAR_GAP) - BAR_GAP;

      html += '<div class="g-row">';
      html += `<div class="g-label" style="min-height:${rowH}px">${room}</div>`;
      html += `<div class="g-timeline" style="min-height:${rowH}px">`;

      G_MONTHS.forEach(({days},i) => {
        html += `<div class="g-month-bg${i%2?'  g-month-bg-alt':''}" style="width:${days/G_DAYS*100}%"></div>`;
      });

      if (todayPct > 0 && todayPct < 100) {
        html += `<div class="g-today-line" style="left:${todayPct}%"></div>`;
      }

      lanes.forEach(({c, lane}) => {
        const left  = datePct(c.startDate);
        const width = Math.max(datePct(c.endDate) - left, 0.4);
        const top   = PAD + lane*(BAR_H+BAR_GAP);
        const cls   = cbClass(c).split(' ').slice(1).join(' ');
        const active = isActiveToday(c) ? ' g-bar-today' : '';
        const tip   = `${c.name}\n${c.instructor||'강사미정'} | ${c.days} | ${c.startDate} ~ ${c.endDate}${c.notes?'\n⚠️ '+c.notes:''}`;
        html += `<div class="g-bar ${cls}${active}" style="left:${left}%;width:${width}%;top:${top}px;height:${BAR_H}px" title="${tip}">
          <span class="g-bar-text">${c.name}</span>
        </div>`;
      });

      html += '</div></div>';
    });

    html += '</div>';
    document.getElementById('gantt-container').innerHTML = html;
  }

  /* ── Sort indicator ── */
  function setSortIndicator(col, dir) {
    document.querySelectorAll('thead th[data-col]').forEach(th => th.classList.remove('asc','desc'));
    const th = document.querySelector(`thead th[data-col="${col}"]`);
    if (th) th.classList.add(dir);
  }

  /* ── Events ── */
  function bindEvents() {
    document.getElementById('search-input').addEventListener('input', e => {
      query = e.target.value; applyFilter();
    });

    document.getElementById('type-filters').addEventListener('click', e => {
      const btn = e.target.closest('.chip'); if (!btn) return;
      document.querySelectorAll('#type-filters .chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); filterType = btn.dataset.type; applyFilter();
    });

    document.getElementById('month-filters').addEventListener('click', e => {
      const btn = e.target.closest('.chip'); if (!btn) return;
      document.querySelectorAll('#month-filters .chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); filterMonth = btn.dataset.month; applyFilter();
    });

    document.querySelector('.view-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.view-btn'); if (!btn) return;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      viewMode = btn.dataset.view;
      document.getElementById('view-table').style.display = viewMode==='table' ? '' : 'none';
      document.getElementById('view-grid').style.display  = viewMode==='grid'  ? '' : 'none';
      document.getElementById('view-gantt').style.display = viewMode==='gantt' ? '' : 'none';
      applyFilter();
    });

    document.getElementById('btn-today').addEventListener('click', () => {
      todayMode = !todayMode;
      document.getElementById('btn-today').classList.toggle('active', todayMode);
      applyFilter();
    });

    document.getElementById('btn-today-close').addEventListener('click', () => {
      todayMode = false;
      document.getElementById('btn-today').classList.remove('active');
      applyFilter();
    });

    document.querySelector('thead').addEventListener('click', e => {
      const th = e.target.closest('th[data-col]'); if (!th) return;
      const col = th.dataset.col;
      sortDir = sortCol === col ? (sortDir==='asc'?'desc':'asc') : 'asc';
      sortCol = col;
      setSortIndicator(sortCol, sortDir);
      renderTable();
    });
  }

  /* ── Boot ── */
  document.addEventListener('DOMContentLoaded', () => {
    try { allCourses = window.__SCHEDULE_DATA__.courses || []; }
    catch(e) {
      document.getElementById('table-body').innerHTML =
        '<tr><td colspan="9" class="empty-msg">❌ 데이터를 불러오지 못했습니다.</td></tr>';
      return;
    }
    initMonthFilters();
    setSortIndicator(sortCol, sortDir);
    bindEvents();
    applyFilter();
  });
})();
</script>

</body>
</html>
